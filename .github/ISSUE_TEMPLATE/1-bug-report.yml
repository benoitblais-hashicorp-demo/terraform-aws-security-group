name: Bug Report
description: File a report to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Enter a clear and concise description of the nature of the bug.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: Enter a clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Copy and paste any relevant log output (e.g., HCP Terraform run logs, Kubernetes events).
      render: shell
    validations:
      required: false
  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
      description: Which version of Terraform (or HCP Terraform) are you using?
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component / Module
      description: Which Stack component or child module is experiencing the issue?
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        *If you are not deploying from the `main` branch, please validate if the problem exists on the latest commit.*
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
